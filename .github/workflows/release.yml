name: Release

on:
  push:
    tags: ["v*"]

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    strategy:
      fail-fast: false
      matrix:
        python: ["cp39", "cp310", "cp311", "cp312", "cp313"]
        platform:
          - os: ubuntu-latest
            arch: x86_64
            skip: "*-musllinux_*"
            name: linux-x86_64-manylinux
          - os: ubuntu-latest
            arch: x86_64
            skip: "*-manylinux_*"
            name: linux-x86_64-musllinux
          - os: ubuntu-latest
            arch: aarch64
            skip: "*-musllinux_*"
            name: linux-aarch64-manylinux
            qemu: true
          - os: ubuntu-latest
            arch: aarch64
            skip: "*-manylinux_*"
            name: linux-aarch64-musllinux
            qemu: true
          - os: macos-latest
            arch: x86_64
            skip: ""
            name: macos-x86_64
          - os: macos-latest
            arch: arm64
            skip: ""
            name: macos-arm64
          - os: windows-latest
            arch: AMD64
            skip: ""
            name: windows-x86_64
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
        if: matrix.platform.qemu
        with:
          platforms: arm64
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: ${{ matrix.platform.arch }}
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_SKIP: "pp* ${{ matrix.platform.skip }}"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.name }}-${{ matrix.python }}
          path: wheelhouse/*.whl

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
