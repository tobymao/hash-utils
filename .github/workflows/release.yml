name: Release

on:
  push:
    tags: ["v*"]

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels-linux-x86_64-manylinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: x86_64
          CIBW_SKIP: pp* *-musllinux_*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-manylinux
          path: wheelhouse/*.whl

  wheels-linux-x86_64-musllinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: x86_64
          CIBW_SKIP: pp* *-manylinux_*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-musllinux
          path: wheelhouse/*.whl

  wheels-linux-aarch64-manylinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: aarch64
          CIBW_SKIP: pp* *-musllinux_*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64-manylinux
          path: wheelhouse/*.whl

  wheels-linux-aarch64-musllinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: aarch64
          CIBW_SKIP: pp* *-manylinux_*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64-musllinux
          path: wheelhouse/*.whl

  wheels-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: x86_64
          CIBW_SKIP: pp*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: wheelhouse/*.whl

  wheels-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: arm64
          CIBW_SKIP: pp*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  wheels-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: AMD64
          CIBW_SKIP: pp*
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  publish:
    needs:
      - sdist
      - wheels-linux-x86_64-manylinux
      - wheels-linux-x86_64-musllinux
      - wheels-linux-aarch64-manylinux
      - wheels-linux-aarch64-musllinux
      - wheels-macos-x86_64
      - wheels-macos-arm64
      - wheels-windows-x86_64
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
