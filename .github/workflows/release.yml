name: Release

on:
  push:
    tags: ["v*"]

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            skip: "pp* *-musllinux_*"
            name: linux-x86_64-manylinux
          - os: ubuntu-latest
            arch: x86_64
            skip: "pp* *-manylinux_*"
            name: linux-x86_64-musllinux
          - os: ubuntu-latest
            arch: aarch64
            skip: "pp* *-musllinux_*"
            name: linux-aarch64-manylinux
            qemu: true
          - os: ubuntu-latest
            arch: aarch64
            skip: "pp* *-manylinux_*"
            name: linux-aarch64-musllinux
            qemu: true
          - os: macos-13
            arch: x86_64
            skip: "pp*"
            name: macos-x86_64
          - os: macos-14
            arch: arm64
            skip: "pp*"
            name: macos-arm64
          - os: windows-latest
            arch: AMD64
            skip: "pp*"
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
        if: matrix.qemu
        with:
          platforms: arm64
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_SKIP: ${{ matrix.skip }}
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
